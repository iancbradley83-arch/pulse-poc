[phases.setup]
nixPkgs = ["python311"]
# OS libraries Chromium needs at runtime. nixpacks builds on a Debian base,
# so apt-style packages work via aptPkgs. These mirror what
# `playwright install --with-deps chromium` would install — listed
# explicitly so we don't depend on the playwright CLI shelling out to
# apt-get during build.
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libatspi2.0-0",
]

[phases.install]
cmds = [
  "cd backend && pip install -r requirements.txt",
  # Download the chromium browser binary into the default cache. We skip
  # --with-deps because the OS libs are already pinned via aptPkgs above.
  "cd backend && python -m playwright install chromium",
]

[start]
cmd = "cd backend && python -c \"import os,uvicorn;uvicorn.run('app.main:app',host='0.0.0.0',port=int(os.environ.get('PORT',8000)))\""
