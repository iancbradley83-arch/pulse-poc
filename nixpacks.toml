[phases.setup]
nixPkgs = ["python311"]

[phases.install]
# pip install the app deps (including playwright), then let the playwright
# CLI install Chromium and all the apt libs it needs for the current distro.
# `--with-deps` invokes apt-get internally with the correct package names
# (Ubuntu Noble's `libasound2t64` vs Jammy's `libasound2`, etc.) so we don't
# hand-maintain that list here.
cmds = [
  "cd backend && pip install -r requirements.txt",
  "cd backend && python -m playwright install --with-deps chromium",
]

[start]
cmd = "cd backend && python -c \"import os,uvicorn;uvicorn.run('app.main:app',host='0.0.0.0',port=int(os.environ.get('PORT',8000)))\""
