<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — brief pause</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0B0E13;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #131720;
      border: 1px solid #232835;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(245, 165, 36, 0.12);
      color: #F5A524;
      border: 1px solid rgba(245, 165, 36, 0.35);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #A0A8B7;
      margin: 0 0 12px;
    }
    p.kicker {
      margin-top: 24px;
      font-size: 13px;
      color: #707888;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">Maintenance</div>
      <h1>Pulse is taking a brief pause</h1>
      <p>We're applying an update. The widget will be back in a few minutes — no action needed on your end.</p>
      <p class="kicker">If this page is still showing in 10+ minutes, the operator has been notified.</p>
    </div>
  </div>
</body>
</html>
