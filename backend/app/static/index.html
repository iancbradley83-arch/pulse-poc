<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Pulse — News-driven bets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v={{ VERSION }}">
</head>
<body>
  <div id="app" data-density="comfortable">
    <header class="pulse-header">
      <div class="brand">
        <span class="logomark" aria-hidden="true"><span class="mark-core"></span></span>
        <span class="wordmark">PULSE</span>
      </div>
      <button class="refresh-btn" type="button" aria-label="Refresh" onclick="PULSE.refresh()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </header>

    <nav id="filter-strip" class="filter-strip" aria-label="Filters"></nav>

    <main id="feed" class="feed" role="feed" aria-busy="true">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </main>

    <footer id="feed-end" class="feed-end" hidden>
      <span class="spark">✴</span> You're all caught up. New stories surface as news breaks.
    </footer>
  </div>

  <script src="/static/app.js?v={{ VERSION }}" defer></script>
</body>
</html>
