<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Pulse — News-driven bets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v={{ VERSION }}">
  <!-- Early theme application — runs before first paint to avoid a
       light-on-dark flash when the user's stored preference is light. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('pulse_theme');
        if (stored !== 'light' && stored !== 'dark') {
          stored = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', stored);
      } catch (_) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
</head>
<body>
  <div id="app" data-density="comfortable">
    <header class="pulse-header">
      <div class="brand">
        <span class="logomark" aria-hidden="true"><span class="mark-core"></span></span>
        <span class="wordmark">PULSE</span>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" type="button" aria-label="Toggle theme" onclick="PULSE.toggleTheme()">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="refresh-btn" type="button" aria-label="Refresh" onclick="PULSE.refresh()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </header>

    <nav id="filter-strip" class="filter-strip" aria-label="Filters"></nav>

    <main id="feed" class="feed" role="feed" aria-busy="true">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </main>

    <footer id="feed-end" class="feed-end" hidden>
      <span class="spark">✴</span> You're all caught up. New stories surface as news breaks.
    </footer>
  </div>

  <script src="/static/reactions.js?v={{ VERSION }}" defer></script>
  <script src="/static/clicks.js?v={{ VERSION }}" defer></script>
  <script src="/static/app.js?v={{ VERSION }}" defer></script>
</body>
</html>
