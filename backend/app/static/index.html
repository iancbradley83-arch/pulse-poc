<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PULSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div id="app">
  <!-- Phone Frame -->
  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time" id="clock">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;&#9675;</span>
        <span>5G</span>
        <span>100%</span>
      </div>
    </div>

    <!-- Top Nav -->
    <div class="top-nav">
      <div class="app-logo">PULSE</div>
      <div class="nav-icons">
        <div class="nav-icon" onclick="refreshFeed()">&#8635;</div>
      </div>
    </div>

    <!-- Tab-specific content area -->
    <div id="feed-tab-content">
      <!-- Sport filters -->
      <div class="filter-bar" id="sport-filter-bar">
        <div class="chip active" data-sport="">&#9889; For You</div>
        <div class="chip" data-sport="nba">NBA</div>
        <div class="chip" data-sport="nfl">NFL</div>
        <div class="chip" data-sport="epl">EPL</div>
      </div>
      <!-- Badge type filters -->
      <div class="filter-bar" id="badge-filter-bar">
        <div class="chip-sm active" data-badge="">All</div>
        <div class="chip-sm" data-badge="milestone">&#127942; Milestone</div>
        <div class="chip-sm" data-badge="trending">&#128293; Trending</div>
        <div class="chip-sm" data-badge="news">&#128240; News</div>
        <div class="chip-sm" data-badge="stat">&#128202; Stat Alert</div>
      </div>
    </div>

    <div id="live-tab-content" style="display:none;">
      <!-- Live game strip -->
      <div class="live-games-strip" id="live-games-strip"></div>
      <!-- Live card type filters -->
      <div class="filter-bar" id="live-filter-bar">
        <div class="chip-sm active" data-live-badge="">All</div>
        <div class="chip-sm" data-live-badge="score_change">&#9889; Just In</div>
        <div class="chip-sm" data-live-badge="momentum_shift">&#128293; Momentum</div>
        <div class="chip-sm" data-live-badge="threshold_approach">&#127919; On Track</div>
        <div class="chip-sm" data-live-badge="milestone">&#127942; Record Watch</div>
      </div>
    </div>

    <!-- Feed container -->
    <div class="feed" id="feed"></div>

    <!-- Bottom Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="prematch" onclick="switchTab('prematch')">
        <span class="tab-icon">&#9889;</span>
        Feed
        <div class="tab-dot"></div>
      </div>
      <div class="tab-item" data-tab="live" onclick="switchTab('live')">
        <span class="tab-icon">&#127915;</span>
        Live
      </div>
      <div class="tab-item" data-tab="bets" onclick="switchTab('bets')">
        <span class="tab-icon">&#128196;</span>
        My Bets
      </div>
      <div class="tab-item" data-tab="profile" onclick="switchTab('profile')">
        <span class="tab-icon">&#128100;</span>
        Profile
      </div>
    </div>

    <!-- Simulator Controls (dev only) -->
    <div class="sim-controls" id="sim-controls" style="display:none;">
      <button onclick="startSimulator()" id="sim-btn">&#9654; Start Sim</button>
    </div>

    <!-- Bet Slip Overlay -->
    <div class="bet-slip-overlay" id="bet-slip-overlay" onclick="closeBetSlip()"></div>

    <!-- Bet Slip Drawer -->
    <div class="bet-slip-drawer" id="bet-slip-drawer">
      <div class="bet-slip-handle"></div>
      <div class="bet-slip-header">
        <div>
          <div class="bet-slip-title" id="bss-market-label">Market</div>
          <div class="bet-slip-subtitle" id="bss-game-label">Game</div>
        </div>
        <div class="bet-slip-close" onclick="closeBetSlip()">&#10005;</div>
      </div>

      <div class="bss-selection-row">
        <div class="bss-pill" id="bss-selection-label">Over</div>
        <div class="bss-odds-badge" id="bss-odds-badge">-110</div>
      </div>

      <div class="stake-section">
        <div class="stake-label-row">
          <span class="stake-label">Stake</span>
          <span class="stake-balance">Balance: $500.00</span>
        </div>
        <div class="stake-input-wrap">
          <span class="stake-currency">$</span>
          <input type="number" id="stake-input" class="stake-input" placeholder="0.00" min="1" step="0.50" oninput="updatePayout()">
        </div>
        <div class="quick-stakes">
          <button class="quick-stake-btn" onclick="setStake(5)">$5</button>
          <button class="quick-stake-btn" onclick="setStake(10)">$10</button>
          <button class="quick-stake-btn" onclick="setStake(25)">$25</button>
          <button class="quick-stake-btn" onclick="setStake(50)">$50</button>
        </div>
      </div>

      <div class="payout-section">
        <div class="payout-row">
          <span class="payout-label">Potential payout</span>
          <span class="payout-value" id="payout-value">—</span>
        </div>
        <div class="payout-row payout-row-profit">
          <span class="payout-label">Profit</span>
          <span class="payout-profit" id="payout-profit">—</span>
        </div>
      </div>

      <button class="place-bet-btn" id="place-bet-btn" onclick="placeBet()" disabled>Place Bet</button>

      <!-- Confirmation state (hidden) -->
      <div class="bet-confirmed" id="bet-confirmed" style="display:none;">
        <div class="confirmed-icon">&#10003;</div>
        <div class="confirmed-title">Bet Placed!</div>
        <div class="confirmed-desc" id="confirmed-desc">Your bet has been placed.</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
